syntax = "proto3";

package types;

import "tagger/tagger.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/olive-io/gflow/api/types;types";
option java_multiple_files = true;
option java_package = "io.olive.gflow.api.types";
option java_outer_classname = "OliveTypes";
option (gogoproto.goproto_unkeyed_all) = false;
option (gogoproto.goproto_unrecognized_all) = false;
option (gogoproto.goproto_sizecache_all) = false;
option (gogoproto.goproto_getters_all) = false;

enum FlowNodeType {
  UnknownNode = 0;
  StartEvent = 1;
  EndEvent = 2;
  BoundaryEvent = 3;
  IntermediateCatchEvent = 4;

  Task = 11;
  SendTask = 12;
  ReceiveTask = 13;
  ServiceTask = 14;
  UserTask = 15;
  ScriptTask = 16;
  ManualTask = 17;
  CallActivity = 18;
  BusinessRuleTask = 19;
  SubProcess = 20;

  EventBasedGateway = 31;
  ExclusiveGateway = 32;
  InclusiveGateway = 33;
  ParallelGateway = 34;
}

message Value {
  enum Type {
    String = 0;
    Integer = 1;
    Float = 2;
    Boolean = 3;
    Array = 4;
    Object = 5;
  }

  Type type = 1;
  string kind = 2;
  string value = 3;
  string default = 4;
}

message Endpoint {
  int64 id = 1 [(tagger.tags) = "gorm:\"primary\""];
  int64 create_at = 2 [(tagger.tags) = "gorm:\"autoCreateTime\""];
  int64 update_at = 3 [(tagger.tags) = "gorm:\"autoUpdateTime\""];

  string kind = 4;
  FlowNodeType type = 5;
  string name = 6;
  string description = 7;
  bool OnTransaction = 8;
  string http_url = 9;
  map<string, string> metadata = 10 [(tagger.tags) = "gorm:\"serializer:json\""];

  repeated string targets = 11 [(tagger.tags) = "gorm:\"serializer:json\""];

  // request data
  map<string, string> headers = 21 [(tagger.tags) = "gorm:\"serializer:json\""];
  map<string, Value> properties = 22 [(tagger.tags) = "gorm:\"serializer:json\""];
  map<string, Value> dataObjects = 23 [(tagger.tags) = "gorm:\"serializer:json\""];
  // response data
  map<string, Value> results = 24 [(tagger.tags) = "gorm:\"serializer:json\""];
}

// Definitions bpmn Definition
message Definitions {
  int64 id = 1 [(tagger.tags) = "gorm:\"primary\""];

  string name = 2;

  int64 create_at = 3 [(tagger.tags) = "gorm:\"autoCreateTime\""];

  int64 update_at = 4 [(tagger.tags) = "gorm:\"autoUpdateTime\""];

  string uid = 5 [(tagger.tags) = "gorm:\"index\""];

  string description = 6;

  map<string, string> metadata = 7 [(tagger.tags) = "gorm:\"serializer:json\""];

  string content = 8;

  uint64 version = 9;

  bool isExecute = 10;
}

message BpmnArgs {
  map<string, string> headers = 1;

  map<string, Value> properties = 2;

  map<string, Value> dataObjects = 3;
}

message Process {
  enum ProcessStage {
    UnknownStage = 0;
    // to be 'Prepare' where Process created
    Prepare = 1;
    // to be 'Ready' where gflow scheduled
    Ready = 2;
    Commit = 3;
    Rollback = 4;
    Destroy = 5;
    Finish = 6;
  }

  enum ProcessStatus {
    UnknownStatus = 0;
    Waiting = 1;
    Running = 2;
    Success = 3;
    Warn = 4;
    Failed = 5;
  }

  int64 id = 1 [(tagger.tags) = "gorm:\"primary\""];

  int64 create_at = 2 [(tagger.tags) = "gorm:\"autoCreateTime\""];

  int64 update_at = 3 [(tagger.tags) = "gorm:\"autoUpdateTime\""];

  string name = 4;

  string uid = 5;

  map<string, string> metadata = 6 [(tagger.tags) = "gorm:\"serializer:json\""];

  int64 priority = 7;

  bool OnTransaction = 8;

  BpmnArgs args = 9 [(tagger.tags) = "gorm:\"serializer:json\""];

  string definitions_uid = 10 [(tagger.tags) = "gorm:\"index\""];

  uint64 definitions_version = 11;

  string definitions_process = 12;

  ProcessContext context = 13 [(tagger.tags) = "gorm:\"serializer:json\""];

  int32 attempts = 14;

  int64 start_at = 15;

  int64 end_at = 16;

  ProcessStage stage = 17;
  ProcessStatus status = 18;

  string err_msg = 19;
}

message ProcessContext {
  map<string, Value> variables = 1;

  map<string, Value> dataObjects = 2;
}

message FlowNode {
  enum FlowNodeStage {
    Prepare = 0;
    Ready = 1;
    Commit = 2;
    Destroy = 3;
    Rollback = 4;
    Finish = 5;
  }

  enum FlowNodeStatus {
    Waiting = 0;
    Running = 1;
    Success = 2;
    Warn = 3;
    Failed = 4;
  }

  int64 id = 1 [(tagger.tags) = "gorm:\"primary\""];

  int64 create_at = 2 [(tagger.tags) = "gorm:\"autoCreateTime\""];

  string name = 3;

  string flow_id = 4;

  FlowNodeType flow_type = 5;

  string kind = 6;

  string target = 7;

  map<string, string> headers = 8 [(tagger.tags) = "gorm:\"serializer:json\""];

  map<string, Value> properties = 9 [(tagger.tags) = "gorm:\"serializer:json\""];

  map<string, Value> data_objects = 10 [(tagger.tags) = "gorm:\"serializer:json\""];

  map<string, Value> results = 11 [(tagger.tags) = "gorm:\"serializer:json\""];

  int32 retries = 12;

  int64 startTime = 13;

  int64 endTime = 14;

  int64 process_id = 15 [(tagger.tags) = "gorm:\"index\""];

  string process_uid = 16;

  FlowNodeStage stage = 17;

  FlowNodeStatus status = 18;

  string err_msg = 19;
}

enum CallTaskStage {
  Echo = 0;
  Commit = 1;
  Rollback = 2;
  Destroy = 3;
}

message CallTaskRequest {
  int64 process = 1;
  uint64 seq_id = 2;
  CallTaskStage stage = 3;
  string kind = 4;
  string name = 5;
  map<string, string> headers = 6;
  map<string, Value> properties = 7;
  map<string, Value> dataObjects = 8;
  int64 timeout = 9;
}

message CallTaskResponse {
  uint64 seq_id = 1;
  CallTaskStage stage = 2;
  map<string, Value> results = 3;
  map<string, Value> dataObjects = 4;
  string error = 5;
}