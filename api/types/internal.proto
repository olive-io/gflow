syntax = "proto3";

package types;

import "tagger/tagger.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/olive-io/gflow/api/types;types";
option java_multiple_files = true;
option java_package = "io.olive.gflow.api.types";
option java_outer_classname = "OliveTypes";
option (gogoproto.goproto_unkeyed_all) = false;
option (gogoproto.goproto_unrecognized_all) = false;
option (gogoproto.goproto_sizecache_all) = false;
option (gogoproto.goproto_getters_all) = false;

// Runner means olive-runner, the runner component of olive system
message Runner {
  enum TransportType {
    GRPCStream = 0;
    GRPCUnary = 1;
    HTTP = 2;
  }

  enum State {
    Unknown = 0;
    Ok = 1;
    Warn = 2;
    Error = 3;
  }

  int64 id = 1 [(tagger.tags) = "gorm:\"primary\""];

  int64 create_at = 2 [(tagger.tags) = "gorm:\"autoCreateTime\""];

  // Unique identified by runner
  string uid = 3 ;

  // listenURL is the URL the runner is listening on.
  string listen_url = 4;

  string version = 5;

  int64 heartbeat_ms = 6;

  string hostname = 7;

  map<string, string> metadata = 8 [(tagger.tags) = "gorm:\"serializer:json\""];

  map<string, string> features = 9 [(tagger.tags) = "gorm:\"serializer:json\""];

  TransportType transport = 10;

  uint64 cpu = 11;

  uint64 memory = 12;

  int64 online_timestamp = 13;
  int64 offline_timestamp = 14;
  int32 online = 15;

  State state = 21;
  string message = 22;
}

message RunnerStat {
  string uid = 1;

  double cpuUsed = 2;

  double memoryUsed = 3;

  string state = 4;

  string error = 5;

  int64 timestamp = 6;

  uint64 steps = 11;
  uint64 commit_count = 12;
  uint64 rollback_count = 13;
  uint64 destroy_count = 14;
}
