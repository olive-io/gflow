syntax = "proto3";

package types;

import "tagger/tagger.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/olive-io/gflow/api/types;types";
option java_multiple_files = true;
option java_package = "io.olive.gflow.api.types";
option java_outer_classname = "OliveTypes";
option (gogoproto.goproto_unkeyed_all) = false;
option (gogoproto.goproto_unrecognized_all) = false;
option (gogoproto.goproto_sizecache_all) = false;
option (gogoproto.goproto_getters_all) = false;

message Role {
  enum Type {
    Unknown = 0;
    Root = 1;
    System = 2;
    Operator = 3;
  }

  int64 id = 1 [(tagger.tags) = "gorm:\"primary\""];
  int64 create_at = 2 [(tagger.tags) = "gorm:\"autoCreateTime\""];
  int64 update_at = 3 [(tagger.tags) = "gorm:\"autoUpdateTime\""];

  Type type = 4;

  string name = 5;

  string display_name = 6;

  string description = 7;

  map<string, string> metadata = 8 [(tagger.tags) = "gorm:\"serializer:json\""];
}

message User {
  int64 id = 1 [(tagger.tags) = "gorm:\"primary\""];
  string uid = 2;
  int64 create_at = 3 [(tagger.tags) = "gorm:\"autoCreateTime\""];
  int64 update_at = 4 [(tagger.tags) = "gorm:\"autoUpdateTime\""];

  string username = 5;

  string email = 6;

  string description = 7;

  map<string, string> metadata = 8 [(tagger.tags) = "gorm:\"serializer:json\""];

  string password = 9;

  string hashed_password = 10;

  int64 last_logon = 11;

  int64 role_id = 12;
}

message Token {
  int64 id = 1 [(tagger.tags) = "gorm:\"primary\""];
  int64 create_at = 2 [(tagger.tags) = "gorm:\"autoCreateTime\""];

  string text = 3;

  int64 expire_at = 4;

  int32 enable = 5;

  int64 user_id = 6;

  int64 role_id = 7;
}

message Interface {
  string operationId = 1;
  string fullMethod = 2;
  string summary = 3;
  string description = 4;
  string method = 5;
  string url = 6;
  repeated string tags = 7;
  map<string, string> security = 8;
  map<string, string> metadata = 9;
  bool deprecated = 10;
}

message Route {
  enum Type {
    Unknown = 0;
    Front = 1;
    Backend = 2;
  }

  int64 id = 1 [(tagger.tags) = "gorm:\"primary\""];

  Type type = 2;

  string name = 3;
  string summary = 4;
  string description = 5;
  string method = 6;
  string url = 7;
  repeated string tags = 8 [(tagger.tags) = "gorm:\"serializer:json\""];
  map<string, string> security = 9 [(tagger.tags) = "gorm:\"serializer:json\""];
  map<string, string> metadata = 10 [(tagger.tags) = "gorm:\"serializer:json\""];
  bool deprecated = 11;
}

message Policy {
  string subject = 1;
  string object = 2;
  string action = 3;
}