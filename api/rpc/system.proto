syntax = "proto3";

package rpc;

import "types/bpmn.proto";
import "types/internal.proto";
// for grpc-gateway
import "google/api/annotations.proto";
// for openapi
import "openapi/v3/annotations.proto";

import "validate/validate.proto";

option go_package = "github.com/olive-io/gflow/api/rpc;rpc";
option java_multiple_files = true;
option java_package = "io.olive.gflow.api.rpc";
option java_outer_classname = "GFlowRPC";

service SystemRPC {
  rpc Ping(PingRequest) returns (PingResponse) {
    option (google.api.http) = {
      get: "/v1/ping"
    };
    option (openapi.v3.operation) = {
      summary: "check the healthy of gflow server"
      description: "check the healthy of gflow server",
    };
  }

  // Register registers runner
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/runners/register"
      body: "*"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["Runner:post"],
            }
          }
        }
      ]
    };
  }
  // Disregister disregisters runner
  rpc Disregister(DisregisterRequest) returns (DisregisterResponse) {
    option (google.api.http) = {
      post: "/v1/runners/disregister"
      body: "*"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["Runner:delete"],
            }
          }
        }
      ]
    };
  }
  rpc ListRunners(ListRunnersRequest) returns (ListRunnersResponse) {
    option (google.api.http) = {
      get: "/v1/runners"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["Runner:get"],
            }
          }
        }
      ]
    };
  };
  rpc GetRunner(GetRunnerRequest) returns (GetRunnerResponse) {
    option (google.api.http) = {
      get: "/v1/runners/{id}"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["Runner:get"],
            }
          }
        }
      ]
    };
  };
  rpc ListEndpoints(ListEndpointsRequest) returns (ListEndpointsResponse) {
    option (google.api.http) = {
      get: "/v1/endpoints"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["Endpoint:get"],
            }
          }
        }
      ]
    };
  }
  rpc AddEndpoints(AddEndpointsRequest) returns (AddEndpointsResponse) {
    option (google.api.http) = {
      post: "/v1/endpoints"
      body: "*"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["Endpoint:post"],
            }
          }
        }
      ]
    };
  }
  rpc AddOpenAPIEndpoints(AddOpenAPIEndpointsRequest) returns (AddOpenAPIEndpointsResponse) {
    option (google.api.http) = {
      post: "/v1/endpoints/openapi"
      body: "*"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["Endpoint:post"],
            }
          }
        }
      ]
    };
  }
  rpc AddGRPCEndpoints(AddGRPCEndpointsRequest) returns (AddGRPCEndpointsResponse) {
    option (google.api.http) = {
      post: "/v1/endpoints/grpc"
      body: "*"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["Endpoint:post"],
            }
          }
        }
      ]
    };
  }
  rpc ConvertEndpoint(ConvertEndpointRequest) returns (ConvertEndpointResponse) {
    option (google.api.http) = {
      post: "/v1/endpoints/{id}/convert"
      body: "*"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["Endpoint:patch"],
            }
          }
        }
      ]
    };
  }
  rpc RunnerDispatch(stream RunnerDispatchRequest) returns (stream RunnerDispatchResponse) {};
}

message PingRequest {}

message PingResponse {
  string reply = 1;
}

message RegisterRequest {
  types.Runner runner = 1;
}

message RegisterResponse {
  types.Runner runner = 1;
}

message DisregisterRequest {
  string id = 1;
}

message DisregisterResponse {
  types.Runner runner = 1;
}

message ListRunnersRequest {
  int32 page = 1;
  int32 size = 2;
}

message ListRunnersResponse {
  repeated types.Runner runners = 1;
  int64 total = 2;
}

message GetRunnerRequest {
  int64 id = 1 [(validate.rules).int64.gt = 0];
  string uid = 2;
}

message GetRunnerResponse {
  types.Runner runner = 1;
  types.RunnerStat stat = 2;
}

message ListEndpointsRequest {
  int32 page = 1;
  int32 size = 2;
}

message ListEndpointsResponse {
  repeated types.Endpoint endpoints = 1;
  int64 total = 2;
}

message AddEndpointsRequest {
  repeated types.Endpoint endpoints = 1;
  string target = 2;
}

message AddEndpointsResponse {}

message AddOpenAPIEndpointsRequest {
  string doc = 1;
  string contentType = 2;
  string target = 3;
}

message AddOpenAPIEndpointsResponse {
  types.Runner runner = 1;
  repeated types.Endpoint endpoints = 2;
}

message AddGRPCEndpointsRequest {
  string target = 1;
}

message AddGRPCEndpointsResponse {
  types.Runner runner = 1;
  repeated types.Endpoint endpoints = 2;
}

message ConvertEndpointRequest {
  enum EndpointFormat {
    Unknown = 0;
    BPMN = 1;
  }

  int64 id = 1;
  EndpointFormat format = 2;
}

message ConvertEndpointResponse {
  string contentType = 1;
  string content = 2;
}

message HandshakeRequest {
  types.Runner runner = 1;
}

message HandshakeResponse {
  string serverID = 1;
  types.Runner runner = 2;
}

message HeartBeatRequest {
  types.RunnerStat stat = 1;
}

message HeartBeatResponse {}

message RunnerDispatchRequest {
  HandshakeRequest handshake = 1;
  HeartBeatRequest heartbeat = 2;
  types.CallTaskResponse callTask = 3;
}

message RunnerDispatchResponse {
  HandshakeResponse handshake = 1;
  HeartBeatResponse heartBeat = 2;
  types.CallTaskRequest callTask = 3;
}
