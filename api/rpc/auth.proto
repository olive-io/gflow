syntax = "proto3";

package rpc;

import "types/auth.proto";
// for grpc-gateway
import "google/api/annotations.proto";
// for openapi
import "openapi/v3/annotations.proto";

import "validate/validate.proto";

option go_package = "github.com/olive-io/gflow/api/rpc;rpc";
option java_multiple_files = true;
option java_package = "io.olive.gflow.api.rpc";
option java_outer_classname = "GFlowRPC";

option (openapi.v3.document) = {
  components: {
    security_schemes: {
      additional_properties: {
        name: "bearerAuth"
        value: {
          security_scheme: {
            type: "http",
            scheme: "bearer",
            bearer_format: "JWT"
          }
        }
      }
    }
  }
};

service AuthRPC {
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/login"
      body: "*"
    };
    option (openapi.v3.operation) = {
      summary: "user login",
      description: "user login",
    };
  }

  rpc GetSelf(GetSelfRequest) returns (GetSelfResponse) {
    option (google.api.http) = {
      get: "/v1/users/self"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["User:get"],
            }
          }
        }
      ]
    };
  }

  rpc UpdateSelf(UpdateSelfRequest) returns (UpdateSelfResponse) {
    option (google.api.http) = {
      patch: "/v1/users/self"
      body: "*"
    };
    option (openapi.v3.operation) = {
      security: [
        {
          additional_properties: {
            name: "bearerAuth",
            value: {
              value: ["User:patch"],
            }
          }
        }
      ]
    };
  }
}

message LoginRequest {
  string username = 1 [(validate.rules).string.min_len = 1];
  string password = 2;
}

message LoginResponse {
  types.Token token = 1;
}

message GetSelfRequest {}

message GetSelfResponse {
  types.User user = 1;
  types.Role role = 2;
  repeated types.Policy policies = 3;
}

message UpdateSelfRequest {
  string oldPassword = 1;
  string password = 2;
  string email = 3;
  string description = 4;
  map<string, string> metadata = 5;
}

message UpdateSelfResponse {
  types.User user = 1;
}